<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Dashboard</title>
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Cossette+Titre:wght@400;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="/static/css/style.css">
</head>
      <body>
            <section>
                  <div class="text">
                        <form action="">
                              <label for="msg" class="msg">Script</label>
                              <textarea class="txtarea" value="" rows="14" cols="70">{{textarea_content}}</textarea>
                              <div class="btns">
                              <input type="submit" value="RAL" class="btnpopup">
                              <a href="#" class="copyall" alt="copy"><span class="material-symbols-outlined">copy_all</span></a>
                              </div>
                        </form>
                        <p class="alertaral"></p>
                        <label class="loading">
                              <span class="sr-only">Loading progress</span>
                              <progress></progress>
                        </label>
                  </div>
            <section>
            <article>
                  <div class="conteiner">
                        <div class="caixa">
                              <img src="../static/img/router.svg">
                              <p><span>RJAMIG00-RMD01</span></p>
                        </div>
                        <div class="interface_state">
                              <div class="status">
                                    <p class="interface">UP</p>
                              </div>
                              <div class="status">
                                    <p class="protocolo">UP</p>
                              </div>
                        </div>
                        <div class="taxa_error">
                              <p>Input <span>00</span></p>
                              <p>CRC <span>00</span></p>
                              <form action="">
                                    <input type="submit" value="Zerar" class="btnsteste"> 
                              </form>
                        </div>
                        <div class="potencia">
                              <p>TX <span>00 dBm</span></p>
                              <p>RX <span>00 dBm</span></p>
                              <form action="">
                                    <input type="submit" value="Teste" class="btnsteste"> 
                              </form>                              
                        </div>
                  </div>
                  <div class="conteiner">
                        <div class="caixa">
                              <img src="../static/img/router.svg">
                              <p><span>RJAMIG00-RMD01</span></p>
                        </div>
                        <div class="interface_state">
                              <div class="status">
                                    <p class="interface">UP</p>
                              </div>
                              <div class="status">
                                    <p class="protocolo">UP</p>
                              </div>
                        </div>
                        <div class="taxa_error">
                              <p>Input <span>00</span></p>
                              <p>CRC <span>00</span></p>
                              <form action="">
                                    <input type="submit" value="Zerar" class="btnsteste"> 
                              </form>
                        </div>
                        <div class="potencia">
                              <p>TX <span>00 dBm</span></p>
                              <p>RX <span>00 dBm</span></p>
                              <form action="">
                                    <input type="submit" value="Teste" class="btnsteste"> 
                              </form>  
                        </div>
                  </div>
            </article>
      </body>
      <!--Classes-->
      <script src="../static/js/CadastrarRal.js"></script>
      <script src="../static/js/ConnectJson.js"></script>
      <!--Classes-->
      <script src="../static/js/actions.js"></script>
      <script src="../static/js/raquestRal.js"></script>
</html>
